<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>promptPACK Options</title>
<link rel="stylesheet" href="theme.css">
<style>
:root {
  --bg: #0d1117;
  --text: var(--portfolio-text);
  --muted: var(--portfolio-muted);
  --accent: var(--portfolio-accent);
  --line: #30363d;
}
body { margin: 0; font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 24px; max-width: 520px; }
h1 { font-size: 20px; margin-bottom: 6px; }
.sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
.card { border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 14px; background: #161b22; }
label { display: block; font-size: 12px; color: var(--muted); margin: 8px 0 4px; }
select, input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--line); background: #0f141b; color: var(--text); font: inherit; }
button { margin-top: 14px; padding: 10px 16px; border-radius: 10px; border: 0; background: linear-gradient(135deg, var(--accent), #e09020); color: #151008; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<h1>promptPACK Options</h1>
<p class="sub">Default objective and token budget sync to the sidepanel via storage.</p>
<div class="card">
<label for="defaultObjective">Default objective</label>
<select id="defaultObjective">
<option value="auto">Auto-detect</option>
<option value="compress">Token compression</option>
<option value="clarity">Clarity optimization</option>
<option value="coding">Coding-agent handoff</option>
<option value="local">Local-model handoff</option>
<option value="research">Research handoff</option>
<option value="audit">Preserve / audit</option>
</select>
<label for="tokenBudget">Token budget hint</label>
<input id="tokenBudget" type="number" min="64" max="32000" value="2048">
<label for="defaultAggression">Default aggression</label>
<select id="defaultAggression">
<option value="conservative">Conservative</option>
<option value="balanced">Balanced</option>
<option value="aggressive">Aggressive</option>
</select>
</div>
<button id="save">Save</button>
<p id="status" class="sub"></p>
<script src="options.js"></script>
</body>
</html>
